interface:
  display_name: "Pharos Agent Dev Suite"
  short_description: "Developer-only Pharos agent skill suite for OpenClaw — full-stack Pharos dapp development with Solidity, wagmi/viem, Foundry/Hardhat, and Next.js."
  long_description: "35 specialized subskills organized across 6 categories: Contract Work, UI Work, Testing & Review, Framework & Tooling, Quality & Performance, and Shipping & Docs. Plan-first execution with risk-gated approvals for high/medium risk subskills."
  default_prompt: "Use $pharos-agent-dev-suite for Pharos development planning and execution. For deployment broadcast/verification, route to pharos-agent-deploy-suite."
  capabilities:
    - "Solidity contract architecture and authoring"
    - "Frontend dapp integration and wallet UI"
    - "Testing strategy, generation, and network-aware tests"
    - "Contract review, bug finding, and CI troubleshooting"
    - "Refactoring, performance optimization, and accessibility"
    - "Deployment prep, migration, docs, and release notes"

metadata:
  audience: developer
  version: 1.0.0
  category: workflow
policy:
  allow_implicit_invocation: true
  require_confirmation_for_high_risk: true
  plan_before_execution: true
  context_minimization: true
