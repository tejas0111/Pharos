interface:
  display_name: "Pharos Agent Dev Suite"
  short_description: "Developer-only Pharos agent skill suite for Claude Code — contract coding (Solidity), dapp frontend integration (wagmi/viem/Next.js), framework setup (Foundry/Hardhat/Remix), testing/review/debugging, CI troubleshooting, repo onboarding, refactoring, dependency upgrades, monorepo management, accessibility, release notes, code scaffolding, docs generation."
  long_description: "Handles all Pharos development work via 35 specialized subskills with plan-first execution and risk-gated approvals. Routes to narrowest matching subskill, gathers minimal context, presents concrete plans, and waits for explicit confirmation before high/medium risk changes."
  default_prompt: "Use $pharos-agent-dev-suite to plan, build, review, debug, or document Pharos developer work. Route to pharos-agent-deploy-suite for broadcast/verification."
  capabilities:
    - "Solidity contract authoring and architecture"
    - "Frontend dapp integration with wagmi/viem/Next.js"
    - "Testing strategy and test generation (Foundry/Hardhat)"
    - "Contract security review and bug finding"
    - "CI/CD troubleshooting and build fix"
    - "Framework setup and configuration"
    - "Refactoring and code health improvement"
    - "Dependency upgrade and monorepo management"

metadata:
  audience: developer
  version: 1.0.0
  category: workflow
policy:
  allow_implicit_invocation: true
  require_confirmation_for_high_risk: true
  plan_before_execution: true
  context_minimization: true
