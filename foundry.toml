[profile.default]
src = "contracts"
out = "out"
libs = ["lib"]
solc_version = "0.8.26"
evm_version = "cancun"
via_ir = false

[rpc_endpoints]
pharos_testnet = "${PHAROS_TESTNET_RPC_URL:-https://atlantic.dplabs-internal.com}"
pharos_mainnet = "${PHAROS_MAINNET_RPC_URL:-https://rpc.pharos.xyz}"

[etherscan]
pharos_testnet = { key = "${PHAROSSCAN_API_KEY}", url = "https://api.socialscan.io/pharos-atlantic-testnet/v1/explorer/command_api/contract" }
pharos_mainnet = { key = "${PHAROSSCAN_API_KEY}", url = "https://api.socialscan.io/pharos-mainnet/v1/explorer/command_api/contract" }
