interface:
  display_name: "Pharos Agent Deploy Suite"
  short_description: "High-risk Pharos deployment suite for Codex — broadcast and verify contracts on testnet/mainnet with Foundry or Hardhat."
  long_description: "Full deployment lifecycle: script selection, simulation, pre-flight checks, broadcast (with explicit approval), post-deploy verification, and rollback guidance. Bundled deploy scripts for both Foundry and Hardhat toolchains."
  default_prompt: "Use $pharos-agent-deploy-suite for contract deployment and verification. Development work should be done first via pharos-agent-dev-suite."
  capabilities:
    - "Contract deployment (testnet and mainnet)"
    - "Explorer verification"
    - "Deployment simulation"
    - "Post-deploy verification"
  deployment_networks:
    - "pharos-testnet"
    - "pharos-mainnet"
  toolchains:
    - "Foundry (forge script)"
    - "Hardhat (npx hardhat deploy/verify)"

metadata:
  audience: developer
  version: 1.0.0
  category: workflow
policy:
  allow_implicit_invocation: true
  require_confirmation_for_high_risk: true
  require_simulation_before_broadcast: true
  require_network_confirmation: true
